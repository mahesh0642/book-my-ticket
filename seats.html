<!DOCTYPE html>
<html>
<head>
  <title>Seats - CineHall</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-slate-900 to-slate-800 min-h-screen p-8">
  <h1 class="text-4xl font-bold text-white mb-8">Book Seats</h1>
  <div id="seats" class="grid grid-cols-5 gap-4 max-w-4xl"></div>
  <script>
    const token = localStorage.getItem('authToken');
    if(!token) location.href = '/';
    
    fetch('/auth/seats', {headers: {Authorization: `Bearer ${token}`}})
      .then(r=>r.json())
      .then(seats => {
        document.getElementById('seats').innerHTML = seats.map(s=>`
          <div class="${s.isbooked ? 'bg-red-500' : 'bg-green-500'} p-8 rounded-lg text-white font-bold cursor-pointer hover:scale-105" 
               onclick="${s.isbooked ? '' : `fetch('/auth/${s.id}/${prompt('Name?')}',{headers:{Authorization:'Bearer ${token}'}}).then(r=>r.json()).then(()=>location.reload())`}">
            ${s.name || `Seat ${s.id}`} ${s.isbooked ? 'BOOKED' : 'FREE'}
          </div>
        `).join('');
      });
  </script>
</body>
</html>
