<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineHall | Premium Auth</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background: linear-gradient(145deg, #0a0e1a, #1a1f2e, #16213e); }
    .gradient-text { background: linear-gradient(135deg,#6366f1,#8b5cf6,#ec4899); -webkit-background-clip: text; color: transparent; }
    .premium-glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1); }
    .form-input { background: rgba(255,255,255,0.08); border: none; outline: none; color: white; width: 100%; padding: 12px 16px; border-radius: 12px; font-size: 16px; }
    .form-input::placeholder { color: #aaa; }
    .form-input:focus { box-shadow: 0 0 0 3px rgba(99,102,241,0.5); }
    .btn-primary { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; font-weight: 600; padding: 14px; border-radius: 12px; border: none; width: 100%; font-size: 16px; cursor: pointer; transition: all 0.3s; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(99,102,241,0.4); }
    .status { padding: 12px; border-radius: 12px; margin-top: 16px; font-weight: 500; text-align: center; }
    .success { background: rgba(34,197,94,0.2); color: #10b981; border: 1px solid rgba(34,197,94,0.5); }
    .error { background: rgba(239,68,68,0.2); color: #ef4444; border: 1px solid rgba(239,68,68,0.5); }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-8">
  <div class="w-full max-w-4xl flex flex-col lg:flex-row gap-12 items-center">
    <!-- Branding -->
    <div class="lg:w-1/2 text-center lg:text-left">
      <h1 class="text-6xl font-black gradient-text mb-6">CineKing</h1>
      <h2 class="text-3xl font-bold text-white mb-4">BookMyShow Premium</h2>
      <p class="text-slate-300 text-lg">   Experience seamless movie booking with premium seat selection and secure authentication..</p>
    </div>
    <!-- Forms -->
    <div class="w-full lg:w-1/2 max-w-md bg-slate-900/30 backdrop-blur-xl rounded-3xl p-10 border border-slate-700 shadow-2xl">
      <!-- Login -->
      <form id="loginForm" class="space-y-6">
        <h2 class="text-2xl font-bold gradient-text text-center">Sign In</h2>
        <input type="email" id="loginEmail" required class="form-input" placeholder="test@example.com">
        <input type="password" id="loginPassword" required class="form-input" placeholder="password123">
        <button type="submit" class="btn-primary">Login</button>
      </form>
      <!-- Register -->
      <form id="registerForm" class="space-y-6 hidden">
        <h2 class="text-2xl font-bold gradient-text text-center">Sign Up</h2>
        <input type="email" id="registerEmail" required class="form-input" placeholder="test@example.com">
        <input type="password" id="registerPassword" required class="form-input" minlength="6" placeholder="password123">
        <button type="submit" class="btn-primary bg-gradient-to-r from-emerald-500 to-teal-500">Sign Up</button>
      </form>
      <div class="text-center">
        <span id="toggleBtn" class="text-slate-400 text-sm cursor-pointer hover:text-blue-400">Don't have account? Sign up</span>
      </div>
      <div id="status" class="status hidden"></div>
    </div>
  </div>
  <script>
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    const toggleBtn = document.getElementById('toggleBtn');
    const status = document.getElementById('status');

    toggleBtn.onclick = () => {
      loginForm.classList.toggle('hidden');
      registerForm.classList.toggle('hidden');
      toggleBtn.textContent = loginForm.classList.contains('hidden') ? 'Have account? Sign in' : "Don't have account? Sign up";
    };

    function showStatus(msg, type = 'error') {
      status.textContent = msg;
      status.className = `status ${type}`;
      status.classList.remove('hidden');
      setTimeout(() => status.classList.add('hidden'), 4000);
    }

    async function api(endpoint, data) {
      const res = await fetch(endpoint, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
      });
      return await res.json();
    }

    // Login
    loginForm.onsubmit = async (e) => {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      try {
        const response = await api('/auth/login', {email, password});
        if (response.success && response.data && response.data.token) {
          localStorage.setItem('token', response.data.token);
          showStatus('✅ Login success! Backend authenticated.', 'success');
          setTimeout(() => location.href = '/code.html', 1500);
        } else {
          showStatus(response.error || response.message || 'Login failed', 'error');
        }
      } catch (e) {
        showStatus('Network error', 'error');
      }
    };

    // Register  
    registerForm.onsubmit = async (e) => {
      e.preventDefault();
      const email = document.getElementById('registerEmail').value;
      const password = document.getElementById('registerPassword').value;
      try {
        const response = await api('/auth/register', {name: email.split('@')[0], email, password});
        if (response.success && response.data && response.data.token) {
          localStorage.setItem('token', response.data.token);
          showStatus('✅ Register success! Backend authenticated.', 'success');
          setTimeout(() => location.href = '/code.html', 1500);
        } else {
          showStatus(response.error || response.message || 'Register failed', 'error');
        }
      } catch (e) {
        showStatus('Network error', 'error');
      }
    };
  </script>
</body>
</html>
